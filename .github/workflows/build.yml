name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: .
            dockerfile: api-gateway/Dockerfile
          - service: user-service
            context: .
            dockerfile: user-service/Dockerfile
          - service: booking-service
            context: .
            dockerfile: booking-service/Dockerfile
          - service: car-service
            context: .
            dockerfile: car-service/Dockerfile
          - service: trip-service
            context: .
            dockerfile: trip-service/Dockerfile
          - service: telematics-service
            context: telematics-service
            dockerfile: telematics-service/Dockerfile
          - service: document-analyzer
            context: document-analyzer
            dockerfile: document-analyzer/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/sorawaslocked/carsharing/${{ matrix.service }}:latest
            ghcr.io/sorawaslocked/carsharing/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
