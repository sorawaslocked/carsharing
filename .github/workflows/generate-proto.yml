name: Generate Protobuf Files

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'protos/proto/**/*.proto'
  pull_request:
    paths:
      - 'protos/proto/**/*.proto'
  workflow_dispatch:

jobs:
  generate-proto:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Protocol Buffers
        run: |
          PROTOC_VERSION=29.3
          wget https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          unzip protoc-${PROTOC_VERSION}-linux-x86_64.zip -d $HOME/protoc
          echo "$HOME/protoc/bin" >> $GITHUB_PATH

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Go protobuf files
        working-directory: protos
        run: |
          mkdir -p gen
          find proto -name "*.proto" | while read proto_file; do
            rel_path=${proto_file#proto/}
            dir_path=$(dirname "$rel_path")
            mkdir -p "gen/$dir_path"
            protoc \
              --proto_path=proto \
              --go_out=gen \
              --go_opt=paths=source_relative \
              --go-grpc_out=gen \
              --go-grpc_opt=paths=source_relative \
              "$proto_file"
          done

      - name: Tidy Go modules
        working-directory: protos
        env:
          GOWORK: 'off'
        run: go mod tidy

      - name: Check for uncommitted changes (PR)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet; then
            echo "Generated proto files are out of date. Regenerate locally and commit."
            git diff --name-only
            exit 1
          fi

      - name: Commit and push generated files
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add protos/gen/
          git add protos/go.mod protos/go.sum
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate protobuf files [skip ci]"
            git push
          fi
