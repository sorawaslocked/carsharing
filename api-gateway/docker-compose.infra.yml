services:
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    networks:
      - car-rental-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - car-rental-net

networks:
  car-rental-net:
    name: car-rental-net

volumes:
  minio_data:
