services:
  postgres:
    container_name: carsharing-postgres
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_USER: carsharing
      POSTGRES_PASSWORD: carsharing
      POSTGRES_DB: carsharing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carsharing"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - carsharing-net

  nats:
    image: nats:2-alpine
    networks:
      - carsharing-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
    expose:
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - carsharing-net

networks:
  carsharing-net:
    name: carsharing-net

volumes:
  postgres_data:
  minio_data:
