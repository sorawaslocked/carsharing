services:
  postgres:
    container_name: car-service-postgres
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_USER: car_rental
      POSTGRES_PASSWORD: car_rental
      POSTGRES_DB: car_rental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_rental"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - car-rental-net

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    networks:
      - car-rental-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - car-rental-net

networks:
  car-rental-net:
    name: car-rental-net

volumes:
  postgres_data:
  minio_data:
