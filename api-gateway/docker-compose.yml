services:
  api-gateway:
    image: ghcr.io/sorawaslocked/carsharing/api-gateway:latest
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: car-rental-api-gateway
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_SUBSCRIBER_USERNAME: ""
      NATS_SUBSCRIBER_PASSWORD: ""
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - car-rental-net

  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    command: "redis-server --requirepass ${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - car-rental-net

networks:
  car-rental-net:
    external: true
