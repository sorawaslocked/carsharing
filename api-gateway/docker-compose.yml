services:
  api-gateway:
    build: .
    container_name: car-rental-api-gateway
    ports:
      - "4000:4000"
    environment:
      REDIS_PASSWORD: secret
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - car-rental-net

  redis:
    image: redis:7-alpine
    container_name: car-rental-redis
    command: "redis-server --requirepass secret"
    environment:
      REDIS_PASSWORD: secret
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a secret ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - car-rental-net

networks:
  car-rental-net:
    external: true
