            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - users
  /users/profile/image-upload:
    get:
      description: Returns a presigned PUT URL and object key for uploading the current
        user's profile image to object storage.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ImageUploadResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get profile image upload URL
      tags:
      - documents
  /ws/car-maintenance/events:
    get:
      description: WebSocket stream of maintenance events ("warn" or "pull") emitted
        by the background evaluator. Streams until token expiry or disconnect.
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.CarMaintenanceEventMessage'
        "401":
          description: unauthorized
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Live maintenance event feed
      tags:
      - car-maintenance
  /ws/cars:
    get:
      description: WebSocket stream of slim car objects matching the filter. Accepts
        the same query params as GET /cars. Streams updates until token expiry or
        disconnect.
      parameters:
      - description: Filter by brand
        in: query
        name: brand
        type: string
      - description: Filter by model
        in: query
        name: model
        type: string
      - description: Filter by fuel type
        in: query
        name: fuelType
        type: string
      - description: Filter by transmission
        in: query
        name: transmission
        type: string
      - description: Filter by body type
        in: query
        name: bodyType
        type: string
      - description: Filter by class
        in: query
        name: class
        type: string
      - description: Minimum seats
        in: query
        name: minSeats
        type: integer
      - description: Center latitude for radius search
        in: query
        name: latitude
        type: number
      - description: Center longitude for radius search
        in: query
        name: longitude
        type: number
      - description: Radius in meters
        in: query
        name: radiusM
        type: integer
      - description: Filter by zone ID
        in: query
        name: zoneId
        type: string
      - description: Minimum fuel level
        in: query
        name: minFuelLevel
        type: number
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.CarFleetMessage'
        "400":
          description: bad request
        "401":
          description: unauthorized
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Live car fleet feed
      tags:
      - cars
  /ws/cars/{id}/status:
    get:
      description: WebSocket stream of status transition events for a single car.
        Streams until token expiry or disconnect.
      parameters:
      - description: Car ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.CarStatusMessage'
        "401":
          description: unauthorized
        "404":
          description: car not found
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Live car status feed
      tags:
      - cars
  /ws/cars/{id}/telemetry:
    get:
      description: WebSocket stream of telemetry updates (fuel, battery, mileage,
        location) for a single car. Streams until token expiry or disconnect.
      parameters:
      - description: Car ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.CarTelemetryMessage'
        "401":
          description: unauthorized
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Live car telemetry feed
      tags:
      - cars
  /ws/trips/{id}:
    get:
      description: WebSocket stream of in-progress trip data (elapsed time, current
        cost, distance). Streams until the trip ends or the client disconnects.
      parameters:
      - description: Trip ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.TripLiveFeedMessage'
        "401":
          description: unauthorized
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Live trip feed
      tags:
      - trips
  /ws/users/documents:
    get:
      description: WebSocket stream of DocumentAnalyzedEvents from the user service.
        Accepts optional userId and passed query params to filter events.
      parameters:
      - description: Filter by user ID
        in: query
        name: userId
        type: string
      - description: Filter by pass/fail result
        in: query
        name: passed
        type: boolean
      produces:
      - application/json
      responses:
        "101":
          description: Streamed WebSocket message format
          schema:
            $ref: '#/definitions/wsdto.DocumentAnalyzedMessage'
        "401":
          description: unauthorized
        "500":
          description: internal server error
      security:
      - BearerAuth: []
      summary: Document analyzed stream
      tags:
      - users
  /zones:
    get:
      description: Returns zones filtered by type and active status.
      parameters:
      - description: Zone type
        enum:
        - operating
        - no_drop
        - parking_hub
        - surcharge
        in: query
        name: type
        type: string
      - description: Filter by active flag
        in: query
        name: isActive
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ZonesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List zones
      tags:
      - zones
    post:
      consumes:
      - application/json
      description: Creates a geographic zone polygon (operating area, no-drop, parking
        hub, or surcharge zone).
      parameters:
      - description: Zone payload (boundary as GeoJSON polygon string)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ZoneCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.IDResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create zone
      tags:
      - zones
  /zones/{id}:
    delete:
      parameters:
      - description: Zone UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete zone
      tags:
      - zones
    get:
      parameters:
      - description: Zone UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ZoneResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get zone by ID
      tags:
      - zones
    patch:
      consumes:
      - application/json
      parameters:
      - description: Zone UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ZoneUpdateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update zone
      tags:
      - zones
securityDefinitions:
  BearerAuth:
    description: 'Enter: Bearer <access_token>'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
