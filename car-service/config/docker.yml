env: "dev"

grpc_server:
  host: "0.0.0.0"
  port: 9998

postgres:
  host: "postgres"
  port: 5432
  user: "carsharing"
  password: "carsharing"
  database: "carsharing"
  ssl_mode: "disable"

nats_publisher:
  urls:
    - "nats://nats:4222"
  name: "car-service-publisher"
  username: ""
  password: ""

nats_subscriber:
  urls:
    - "nats://nats:4222"
  name: "car-service-subscriber"
  username: ""
  password: ""

minio:
  endpoint: "minio:9000"
  public_endpoint: "localhost:9000"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  bucket: "carsharing"
  use_ssl: false

telemetry_stream:
  host: "carsharing-telemetry-service"
  port: 50051

telemetry:
  staleness_threshold: 2m
