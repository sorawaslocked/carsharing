services:
  postgres:
    image: postgis/postgis:17-3.5-alpine
    environment:
      POSTGRES_USER: car_rental
      POSTGRES_PASSWORD: car_rental
      POSTGRES_DB: car_rental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_rental"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://car_rental:car_rental@postgres:5432/car_rental?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  car-service:
    build: .
    ports:
      - "9998:9998"
    environment:
      POSTGRES_PASSWORD: car_rental
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      NATS_URL: nats://nats:4222
    networks:
      - default
      - car-rental-net
    depends_on:
      migrate:
        condition: service_completed_successfully

networks:
  car-rental-net:
    external: true

volumes:
  postgres_data:
