syntax = "proto3";

package base.booking;

import "base/common.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/base/booking";

message Booking {
  string id = 1;
  string user_id = 2;
  string car_id = 3;

  optional int32 committed_periods = 4;
  string status = 5;
  string pricing_rule_id = 6;
  base.PricingSnapshot pricing_snapshot = 7;

  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message BookingStatusReading {
  string id = 1;
  string booking_id = 2;
  string from_status = 3;
  string to_status = 4;
  string actor_type = 5;
  optional string actor_id = 6;
  optional string reason = 7;
  google.protobuf.Timestamp changed_at = 8;
}
