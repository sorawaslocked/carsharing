syntax = "proto3";

package base;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/base";

message CarModel {
  string ID = 1;
  string brand = 2;
  string model = 3;
  int32 year = 4;
  string fuelType = 5;
  string transmission = 6;
  string bodyType = 7;
  string class = 8;
  int32 seats = 9;
  optional float engineVolume = 10;
  int32 rangeKM = 11;
  repeated string features = 12;

  google.protobuf.Timestamp createdAt = 13;
  google.protobuf.Timestamp updatedAt = 14;
}
