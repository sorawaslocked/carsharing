syntax = "proto3";

package base;

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/base";

message ImageUploadData {
  string presigned_put_url = 1;
  string object_key = 2;
}

message Pagination {
  int64 limit = 1;
  int64 offset = 2;
}

message Location {
  double latitude = 1;
  double longitude = 2;
}
