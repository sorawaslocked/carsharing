syntax = "proto3";

package base.user;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/base/user";

message User {
  string ID = 1;
  string email = 2;
  optional string phoneNumber = 3;
  string firstName = 4;
  string lastName = 5;
  string birthDate = 6;
  bytes passwordHash = 7;
  optional string profileImageURL = 8;

  repeated string roles = 9;
  bool isDocumentVerified = 10;
  bool isEmailVerified = 11;
  bool isSuspended = 12;

  google.protobuf.Timestamp createdAt = 13;
  google.protobuf.Timestamp updatedAt = 14;
}

message Document {
  string ID = 1;
  string userID = 2;
  string imageType = 3;
  string status = 4;
  optional string error = 5;
  string imageURL = 6;

  google.protobuf.Timestamp createdAt = 7;
  google.protobuf.Timestamp updatedAt = 8;
}
