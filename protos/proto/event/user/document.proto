syntax = "proto3";

package event.user;

import "base/user/user.proto";

option go_package = "carsharing/protos/gen/event/user";

message DocumentAnalyzedEvent {
  string                    document_id = 1;
  bool                      passed      = 2;
  repeated base.user.Defect defects     = 3;
  string                    user_id     = 4;
}