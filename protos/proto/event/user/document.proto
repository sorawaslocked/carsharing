syntax = "proto3";

package event.user;

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/event/user";

message DocumentAnalyzedEvent {
  string          document_id = 1;
  bool            passed      = 2;
  repeated Defect defects     = 3;
}

message Defect {
  string type        = 1;
  string description = 2;
}