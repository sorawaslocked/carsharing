syntax = "proto3";

package service.car;

import "base/car.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/service/car";

service CarService {
  rpc CreateCar (CreateCarRequest) returns (CreateCarResponse);
  rpc GetCar(GetCarRequest) returns (GetCarResponse);
  rpc GetCars(GetCarsRequest) returns (GetCarsResponse);
  rpc GetAvailableCars(GetAvailableCarsRequest) returns (GetAvailableCarsResponse);
  rpc UpdateCar(UpdateCarRequest) returns (UpdateCarResponse);
  rpc UpdateCarStatus(UpdateCarStatusRequest) returns (UpdateCarStatusResponse);
  rpc DeleteCar(DeleteCarRequest) returns (DeleteCarResponse);
}

// CreateCar
message CreateCarRequest {
  string modelID = 1;
  string VIN = 2;
  string licensePlate = 3;
  string color = 4;
  int32 yearManufactured = 5;
  int64 mileageKM = 6;
  optional float fuelLevel = 7;
  optional float batteryLevel = 8;
  repeated string notes = 9;
}

message CreateCarResponse {
  string ID = 1;
}

// GetCar
message GetCarRequest {
  string ID = 1;
}

message GetCarResponse {
  base.Car car = 1;
}

// GetCars
message GetCarsRequest {
  optional string brand = 1;
  optional string model = 2;
  optional string fuelType = 3;
  optional string transmission = 4;
  optional string bodyType = 5;
  optional string class = 6;
  optional int32 minSeats = 7;

  optional string status = 8;
  optional double latitude = 9;
  optional double longitude = 10;
  optional double radiusKM = 11;

  optional int64 limit = 12;
  optional int64 offset = 13;
}

message GetCarsResponse {
  repeated base.Car cars = 1;
}

// GetAvailableCars
message GetAvailableCarsRequest {
  optional string brand = 1;
  optional string model = 2;
  optional string fuelType = 3;
  optional string transmission = 4;
  optional string bodyType = 5;
  optional string class = 6;
  optional int32 minSeats = 7;

  optional double latitude = 8;
  optional double longitude = 9;
  optional double radiusKM = 10;

  optional int64 limit = 11;
  optional int64 offset = 12;
}

message GetAvailableCarsResponse {
  repeated base.Car cars = 1;
}

// UpdateCar
message UpdateCarRequest {
  string ID = 1;

  optional string modelID = 2;
  optional string licensePlate = 3;
  optional string color = 4;
  repeated string notes = 5;
}

message UpdateCarResponse {}

// UpdateCarStatus
message UpdateCarStatusRequest {
  string ID = 1;
  string status = 2;
}

message UpdateCarStatusResponse {}

// DeleteCar
message DeleteCarRequest {
  string ID = 1;
}

message DeleteCarResponse {}
