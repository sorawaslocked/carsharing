syntax = "proto3";

package service.car;

import "base/car/car_maintenance.proto";
import "base/common.proto";
import "google/protobuf/empty.proto";

option go_package = "carsharing/protos/gen/service/car";

service CarMaintenanceService {
  rpc CreateMaintenanceTemplate(CreateMaintenanceTemplateRequest) returns (CreateMaintenanceTemplateResponse);
  rpc GetMaintenanceTemplate(GetMaintenanceTemplateRequest) returns (GetMaintenanceTemplateResponse);
  rpc ListMaintenanceTemplates(ListMaintenanceTemplatesRequest) returns (ListMaintenanceTemplatesResponse);
  rpc UpdateMaintenanceTemplate(UpdateMaintenanceTemplateRequest) returns (google.protobuf.Empty);
  rpc DeleteMaintenanceTemplate(DeleteMaintenanceTemplateRequest) returns (google.protobuf.Empty);

  rpc ListMaintenanceRecords(ListMaintenanceRecordsRequest) returns (ListMaintenanceRecordsResponse);
  rpc CompleteMaintenanceRecord(CompleteMaintenanceRecordRequest) returns (google.protobuf.Empty);

  rpc GetMaintenanceReceiptImageUploadData(google.protobuf.Empty) returns (GetMaintenanceReceiptImageUploadDataResponse);
}

message CreateMaintenanceTemplateRequest {
  string name = 1;

  optional int32 km_interval  = 2;
  optional int32 day_interval = 3;

  bool   is_mandatory = 4;
  double warn_pct     = 5;
  double pull_pct     = 6;
}

message CreateMaintenanceTemplateResponse {
  string id = 1;
}

message GetMaintenanceTemplateRequest {
  string id = 1;
}

message GetMaintenanceTemplateResponse {
  base.car.CarMaintenanceTemplate template = 1;
}

message ListMaintenanceTemplatesRequest {
  optional base.Pagination pagination = 1;
}

message ListMaintenanceTemplatesResponse {
  repeated base.car.CarMaintenanceTemplate templates = 1;
}

message UpdateMaintenanceTemplateRequest {
  string id = 1;

  optional string name         = 2;
  optional int32  km_interval  = 3;
  optional int32  day_interval = 4;
  optional bool   is_mandatory = 5;
  optional double warn_pct     = 6;
  optional double pull_pct     = 7;
}

message DeleteMaintenanceTemplateRequest {
  string id = 1;
}

message ListMaintenanceRecordsRequest {
  optional string          car_id      = 1;
  optional string          template_id = 2;
  optional string          status      = 3;
  optional base.Pagination pagination  = 4;
}

message ListMaintenanceRecordsResponse {
  repeated base.car.CarMaintenanceRecord records = 1;
}

message CompleteMaintenanceRecordRequest {
  string record_id = 1;

  int32           mileage_at_completion_km = 2;
  int32           cost_tenge               = 3;
  repeated string receipt_image_keys       = 4;
  optional string notes                    = 5;
}

message GetMaintenanceReceiptImageUploadDataResponse {
  base.ImageUploadData upload_data = 1;
}
