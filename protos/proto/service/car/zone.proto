syntax = "proto3";

package service.car;

import "base/car/zone.proto";
import "base/common.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/service/car";

service ZoneService {
  rpc CreateZone(CreateZoneRequest) returns (CreateZoneResponse);
  rpc GetZone(GetZoneRequest) returns (GetZoneResponse);
  rpc ListZones(ListZonesRequest) returns (ListZonesResponse);
  rpc UpdateZone(UpdateZoneRequest) returns (google.protobuf.Empty);
  rpc DeleteZone(DeleteZoneRequest) returns (google.protobuf.Empty);
}

message CreateZoneRequest {
  string name = 1;
  string type = 2;
  string boundary_geo_json = 3;
  int32 fee_adjustment = 4;
}

message CreateZoneResponse {
  string id = 1;
}

message GetZoneRequest {
  string id = 1;
}

message GetZoneResponse {
  base.car.Zone zone = 1;
}

message ListZonesRequest {
  optional string type = 1;
  optional bool is_active = 2;
  optional base.Pagination pagination = 3;
}

message ListZonesResponse {
  repeated base.car.Zone zones = 1;
}

message UpdateZoneRequest {
  string id = 1;
  optional string name = 2;
  optional string type = 3;
  optional string boundary_geo_json = 4;
  optional int32 fee_adjustment = 5;
  optional bool is_active = 6;
}

message DeleteZoneRequest {
  string id = 1;
}
