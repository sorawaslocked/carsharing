syntax = "proto3";

package service;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/service";

message ServiceHealthResponse {
  string name = 1;
  string status = 2;
  string version = 3;

  google.protobuf.Timestamp timestamp = 4;

  uint64 uptime_seconds = 5;

  repeated DependencyHealth dependencies = 6;
}

message DependencyHealth {
  string name = 1;
  string status = 2;

  optional uint32 latency_ms = 3;

  optional string error = 4;
}