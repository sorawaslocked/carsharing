syntax = "proto3";

package service.telemetry;

import "google/protobuf/timestamp.proto";

option go_package = "carsharing/protos/gen/service/telemetry";

service CarTelemetryStreamService {
  rpc StreamCarTelemetryEvents(StreamCarTelemetryEventsRequest)
      returns (stream StreamCarTelemetryEventsResponse);
}

message StreamCarTelemetryEventsRequest {
  string car_id = 1;
}

message StreamCarTelemetryEventsResponse {
  string car_id    = 1;
  double latitude  = 2;
  double longitude = 3;

  optional float fuel_level    = 4;
  optional float battery_level = 5;
  int64          mileage_km    = 6;

  google.protobuf.Timestamp recorded_at = 7;
}
