syntax = "proto3";

package service.user;

import "base/user/user.proto";
import "base/helpers.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/sorawaslocked/car-rental-protos/gen/service/user";

service UserService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetAllWithFilter(GetAllWithFilterRequest) returns (GetAllWithFilterResponse);
  rpc Update(UpdateRequest) returns (google.protobuf.Empty);
  rpc Delete(DeleteRequest) returns (google.protobuf.Empty);

  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc SignIn(SignInRequest) returns (SignInResponse);

  rpc SendActivationCode(SendActivationCodeRequest) returns (google.protobuf.Empty);
  rpc CheckActivationCode(CheckActivationCodeRequest) returns (google.protobuf.Empty);

  rpc CreateDocument(CreateDocumentRequest) returns (CreateDocumentResponse);
  rpc GetUploadDocumentData(GetUploadDocumentDataRequest) returns (GetUploadDocumentDataResponse);
  rpc GetProcessedDocumentsForUser(GetProcessedDocumentsForUserRequest) returns (GetProcessedDocumentsForUserResponse);
  rpc CheckDocument(CheckDocumentRequest) returns (google.protobuf.Empty);
}

// CRUD
message CreateRequest {
  string email = 1;
  optional string phoneNumber = 2;
  string firstName = 3;
  string lastName = 4;
  string birthDate = 5;
  string password = 6;
  string passwordConfirmation = 7;
}

message CreateResponse {
  optional string ID = 1;
}

message GetRequest {
  string ID = 1;
}

message GetResponse {
  base.user.User user = 1;
}

message GetAllWithFilterRequest {
  optional string email = 1;
  optional string phoneNumber = 2;
  optional string firstName = 3;
  optional string lastName = 4;
  optional bool isDocumentVerified = 5;
  optional bool isEmailVerified = 6;
  optional bool isSuspended = 7;
  optional base.Pagination pagination = 8;
}

message GetAllWithFilterResponse {
  repeated base.user.User users = 1;
}

message UpdateRequest {
  string ID = 1;

  optional string email = 2;
  optional string phoneNumber = 3;
  optional string firstName = 4;
  optional string lastName = 5;
  optional string birthDate = 6;
  optional string password = 7;
  optional string passwordConfirmation = 8;
  optional string profileImageKey = 9;

  repeated string roles = 10;
  optional bool isDocumentVerified = 11;
  optional bool isEmailVerified = 12;
  optional bool isSuspended = 13;
}

message DeleteRequest {
  string ID = 1;
}

// Auth
message RegisterRequest {
  string email = 1;
  optional string phoneNumber = 2;
  string firstName = 3;
  string lastName = 4;
  string birthDate = 5;
  string password = 6;
  string passwordConfirmation = 7;
}

message RegisterResponse {
  string ID = 1;
}

message SignInRequest {
  optional string email = 1;
  optional string phoneNumber = 2;
  string password = 3;
}

message SignInResponse {
  string ID = 1;
}

// Activation Code
message SendActivationCodeRequest {}

message CheckActivationCodeRequest {
  string code = 1;
}

// Document
message CreateDocumentRequest {
  string objectKey = 2;
  string imageType = 3;
}

message CreateDocumentResponse {
  string ID = 1;
}

message GetUploadDocumentDataRequest {
  string imageType = 1;
}

message GetUploadDocumentDataResponse {
  base.ImageUploadData uploadData = 1;
}

message GetProcessedDocumentsForUserRequest {
  string userID = 1;
}

message GetProcessedDocumentsForUserResponse {
  repeated base.user.Document documents = 1;
}

message CheckDocumentRequest {
  string docID = 1;
  string status = 2;
  optional string error = 3;
}
