services:
  migrate:
    container_name: trip-service-migrate
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://car_rental:car_rental@car-service-postgres:5432/car_rental?sslmode=disable&x-migrations-table=trip_service_migrations"
      - "up"
    networks:
      - car-rental-net

  trip-service:
    container_name: trip-service
    build: .
    ports:
      - "9996:9996"
    environment:
      POSTGRES_PASSWORD: car_rental
      NATS_URL: nats://nats:4222
    networks:
      - car-rental-net
    depends_on:
      migrate:
        condition: service_completed_successfully

networks:
  car-rental-net:
    external: true
