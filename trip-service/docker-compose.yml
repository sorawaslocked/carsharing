services:
  migrate:
    container_name: trip-service-migrate
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://car_rental:${POSTGRES_PASSWORD}@postgres:5432/car_rental?sslmode=disable&x-migrations-table=trip_service_migrations"
      - "up"
    networks:
      - car-rental-net

  trip-service:
    container_name: trip-service
    build:
      context: ..
      dockerfile: trip-service/Dockerfile
    ports:
      - "9996:9996"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NATS_PUBLISHER_USERNAME: ""
      NATS_PUBLISHER_PASSWORD: ""
    networks:
      - car-rental-net
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: on-failure

networks:
  car-rental-net:
    external: true
