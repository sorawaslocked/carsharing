services:
  postgres:
    image: postgres:17-alpine
    container_name: user-service-postgres
    environment:
      POSTGRES_USER: car_rental
      POSTGRES_PASSWORD: car_rental
      POSTGRES_DB: car_rental
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_rental"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - car-rental-net

  redis:
    image: redis:7-alpine
    container_name: user-service-redis
    command: redis-server --requirepass secret
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a secret ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - car-rental-net

  migrate:
    container_name: user-service-migrate
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://car_rental:car_rental@user-service-postgres:5432/car_rental?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - car-rental-net

  user-service:
    build: .
    ports:
      - "9999:9999"
    environment:
      POSTGRES_PASSWORD: car_rental
      REDIS_PASSWORD: secret
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - car-rental-net

networks:
  car-rental-net:
    external: true

volumes:
  postgres_data:
